<svg width="900" height="980" viewBox="0 0 900 980" xmlns="http://www.w3.org/2000/svg" style="background:#0d1117;border-radius:12px;">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#484f58" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#484f58" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- RAW DATA -->
  <rect x="50" y="30" width="800" height="70" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <rect x="50" y="30" width="4" height="70" rx="2" fill="#8b949e"/>
  <text x="80" y="62" font-family="ui-monospace,monospace" font-size="13" font-weight="600" fill="#e6edf3">75,000 Amazon US grocery products</text>
  <text x="80" y="84" font-family="ui-monospace,monospace" font-size="11" fill="#8b949e">train.csv + product images · huggingface.co/datasets/amanDS5153/retailgraph-products</text>

  <!-- arrow -->
  <line x1="450" y1="100" x2="450" y2="130" stroke="#484f58" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- WEAK SUPERVISION -->
  <rect x="50" y="130" width="800" height="90" rx="8" fill="#161b22" stroke="#7c3aed" stroke-width="1"/>
  <rect x="50" y="130" width="4" height="90" rx="2" fill="#7c3aed"/>
  <text x="80" y="155" font-family="ui-monospace,monospace" font-size="10" font-weight="600" fill="#a78bfa" letter-spacing="1">PHASE 1–2 · WEAK SUPERVISION + SCHEMA</text>
  <text x="80" y="178" font-family="ui-monospace,monospace" font-size="12" fill="#e6edf3">31 Snorkel labeling functions · keyword · regex · price signal · Hinglish brand detection</text>
  <text x="80" y="198" font-family="ui-monospace,monospace" font-size="11" fill="#8b949e">prob ≥ 0.85 → auto-accept  ·  0.50–0.85 → review queue  ·  &lt; 0.50 → reject  ·  Pydantic v2 schema</text>

  <!-- arrow -->
  <line x1="450" y1="220" x2="450" y2="250" stroke="#484f58" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- TRAINING DATA -->
  <rect x="50" y="250" width="800" height="100" rx="8" fill="#161b22" stroke="#0ea5e9" stroke-width="1"/>
  <rect x="50" y="250" width="4" height="100" rx="2" fill="#0ea5e9"/>
  <text x="80" y="275" font-family="ui-monospace,monospace" font-size="10" font-weight="600" fill="#38bdf8" letter-spacing="1">PHASE 3 · TRAINING DATA GENERATION</text>
  <text x="80" y="298" font-family="ui-monospace,monospace" font-size="12" fill="#e6edf3">3,208 GPT-4o-mini pairs  ·  500 visual pairs (image + text)  ·  500 synthetic templates</text>
  <text x="80" y="318" font-family="ui-monospace,monospace" font-size="11" fill="#8b949e">Self-training failed (category 82%→66%) · GPT-4o-mini re-verification · 5,369 final pairs · $0.15</text>
  <text x="80" y="338" font-family="ui-monospace,monospace" font-size="11" fill="#8b949e">487 category corrections (22.5%)  ·  298 dietary tag corrections (13.8%)</text>

  <!-- arrow -->
  <line x1="450" y1="350" x2="450" y2="380" stroke="#484f58" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- FINE-TUNING -->
  <rect x="50" y="380" width="800" height="100" rx="8" fill="#161b22" stroke="#7c3aed" stroke-width="1"/>
  <rect x="50" y="380" width="4" height="100" rx="2" fill="#7c3aed"/>
  <text x="80" y="405" font-family="ui-monospace,monospace" font-size="10" font-weight="600" fill="#a78bfa" letter-spacing="1">PHASE 4–5 · FINE-TUNING + EVALUATION</text>
  <text x="80" y="428" font-family="ui-monospace,monospace" font-size="12" fill="#e6edf3">Qwen2-VL 7B  ·  QLoRA rank 16  ·  Unsloth  ·  Modal A100 80GB  ·  ~2.9 hrs  ·  ~$29</text>
  <text x="80" y="448" font-family="ui-monospace,monospace" font-size="11" fill="#8b949e">40.4M / 8.33B trainable params (0.48%)  ·  3 training rounds  ·  final loss 0.02</text>
  <text x="80" y="468" font-family="ui-monospace,monospace" font-size="11" fill="#34d399">94.2% overall accuracy  ·  0 parse errors  ·  8.7s avg latency  ·  678 validation examples</text>

  <!-- arrow -->
  <line x1="450" y1="480" x2="450" y2="510" stroke="#484f58" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- EXTRACTION -->
  <rect x="50" y="510" width="800" height="90" rx="8" fill="#161b22" stroke="#0ea5e9" stroke-width="1"/>
  <rect x="50" y="510" width="4" height="90" rx="2" fill="#0ea5e9"/>
  <text x="80" y="535" font-family="ui-monospace,monospace" font-size="10" font-weight="600" fill="#38bdf8" letter-spacing="1">PHASE 6 · BATCH EXTRACTION + CONFIDENCE SCORING</text>
  <text x="80" y="558" font-family="ui-monospace,monospace" font-size="12" fill="#e6edf3">JSON validity · Pydantic schema · field completeness · weak supervision agreement</text>
  <text x="80" y="578" font-family="ui-monospace,monospace" font-size="11" fill="#8b949e">2,161 high-conf extractions from 3,920 processed  ·  65% high-conf  ·  22% review  ·  13% failed</text>

  <!-- Split arrow -->
  <line x1="450" y1="600" x2="450" y2="625" stroke="#484f58" stroke-width="1.5"/>
  <line x1="230" y1="625" x2="670" y2="625" stroke="#484f58" stroke-width="1.5"/>
  <line x1="230" y1="625" x2="230" y2="650" stroke="#484f58" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="670" y1="625" x2="670" y2="650" stroke="#484f58" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- NEO4J -->
  <rect x="50" y="650" width="370" height="110" rx="8" fill="#161b22" stroke="#1d4ed8" stroke-width="1"/>
  <rect x="50" y="650" width="4" height="110" rx="2" fill="#1d4ed8"/>
  <text x="80" y="672" font-family="ui-monospace,monospace" font-size="10" font-weight="600" fill="#60a5fa" letter-spacing="1">PHASE 7a · NEO4J AURADB</text>
  <text x="80" y="695" font-family="ui-monospace,monospace" font-size="11" fill="#e6edf3">2,160 Product · 1,041 Brand · 17 Category</text>
  <text x="80" y="713" font-family="ui-monospace,monospace" font-size="11" fill="#e6edf3">17 DietaryTag · 47 Allergen nodes</text>
  <text x="80" y="731" font-family="ui-monospace,monospace" font-size="11" fill="#8b949e">6,248 relationships total</text>
  <text x="80" y="749" font-family="ui-monospace,monospace" font-size="10" fill="#8b949e">BELONGS_TO · MADE_BY · HAS_TAG · CONTAINS_ALLERGEN</text>

  <!-- QDRANT -->
  <rect x="480" y="650" width="370" height="110" rx="8" fill="#161b22" stroke="#16a34a" stroke-width="1"/>
  <rect x="480" y="650" width="4" height="110" rx="2" fill="#16a34a"/>
  <text x="510" y="672" font-family="ui-monospace,monospace" font-size="10" font-weight="600" fill="#4ade80" letter-spacing="1">PHASE 7b · QDRANT CLOUD</text>
  <text x="510" y="695" font-family="ui-monospace,monospace" font-size="11" fill="#e6edf3">2,161 vectors · dim 384 · cosine distance</text>
  <text x="510" y="713" font-family="ui-monospace,monospace" font-size="11" fill="#e6edf3">all-MiniLM-L6-v2 embeddings</text>
  <text x="510" y="731" font-family="ui-monospace,monospace" font-size="11" fill="#8b949e">Filtered vector search with payload</text>
  <text x="510" y="749" font-family="ui-monospace,monospace" font-size="10" fill="#8b949e">price · dietary_tags · category · allergen_list</text>

  <!-- Merge arrows -->
  <line x1="230" y1="760" x2="230" y2="790" stroke="#484f58" stroke-width="1.5"/>
  <line x1="670" y1="760" x2="670" y2="790" stroke="#484f58" stroke-width="1.5"/>
  <line x1="230" y1="790" x2="670" y2="790" stroke="#484f58" stroke-width="1.5"/>
  <line x1="450" y1="790" x2="450" y2="815" stroke="#484f58" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- GRAPHRAG -->
  <rect x="50" y="815" width="800" height="90" rx="8" fill="#161b22" stroke="#db2777" stroke-width="1"/>
  <rect x="50" y="815" width="4" height="90" rx="2" fill="#db2777"/>
  <text x="80" y="840" font-family="ui-monospace,monospace" font-size="10" font-weight="600" fill="#f472b6" letter-spacing="1">PHASE 7c · GRAPHRAG HYBRID SEARCH</text>
  <text x="80" y="863" font-family="ui-monospace,monospace" font-size="12" fill="#e6edf3">Qdrant semantic search → top-50 candidates → Neo4j constraint verification → ranked results</text>
  <text x="80" y="883" font-family="ui-monospace,monospace" font-size="11" fill="#8b949e">hybrid score = 0.7 × semantic + 0.3 × quality  ·  "Vectors guess. Graphs know. GraphRAG does both."</text>

  <!-- arrow -->
  <line x1="450" y1="905" x2="450" y2="930" stroke="#484f58" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- AGENT -->
  <rect x="50" y="930" width="800" height="30" rx="8" fill="#161b22" stroke="#7c3aed" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="50" y="930" width="4" height="30" rx="2" fill="#7c3aed"/>
  <text x="80" y="950" font-family="ui-monospace,monospace" font-size="10" font-weight="600" fill="#a78bfa" letter-spacing="1">PHASE 10 · LANGGRAPH AGENT · Pydantic AI · Redis semantic cache · LangSmith tracing  [in progress]</text>
</svg>
