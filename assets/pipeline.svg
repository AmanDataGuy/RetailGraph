<svg viewBox="0 0 700 1020" xmlns="http://www.w3.org/2000/svg" style="background:#0d1117">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="4" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4a5568"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="350" y="38" text-anchor="middle" fill="#e2e8f0" font-family="'Segoe UI', system-ui, sans-serif" font-size="18" font-weight="700" letter-spacing="1">RetailGraph · Pipeline</text>

  <!-- Phase 1: Raw Data -->
  <rect x="60" y="58" width="580" height="72" rx="8" fill="#1a2332" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="60" y="58" width="5" height="72" rx="2" fill="#3b82f6"/>
  <text x="82" y="80" fill="#93c5fd" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="700">Phase 1 · Raw Data</text>
  <text x="82" y="99" fill="#cbd5e1" font-family="'Segoe UI', system-ui, sans-serif" font-size="11">75,000 Amazon US grocery products · Product images · Text catalog listings</text>
  <text x="82" y="117" fill="#94a3b8" font-family="'Segoe UI', system-ui, sans-serif" font-size="10.5">train.csv (73MB) · HuggingFace image dataset · amanDS5153/retailgraph-products</text>

  <!-- Arrow -->
  <line x1="350" y1="130" x2="350" y2="150" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Phase 2: Weak Supervision -->
  <rect x="60" y="155" width="580" height="72" rx="8" fill="#1a2d2d" stroke="#10b981" stroke-width="1.5"/>
  <rect x="60" y="155" width="5" height="72" rx="2" fill="#10b981"/>
  <text x="82" y="177" fill="#6ee7b7" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="700">Phase 3 · Weak Supervision</text>
  <text x="82" y="196" fill="#cbd5e1" font-family="'Segoe UI', system-ui, sans-serif" font-size="11">31 Snorkel labeling functions · Active learning queue · Entropy × disagreement sampling</text>
  <text x="82" y="214" fill="#94a3b8" font-family="'Segoe UI', system-ui, sans-serif" font-size="10.5">Probabilistic labels for category + dietary tags · Zero manual annotation</text>

  <!-- Arrow -->
  <line x1="350" y1="227" x2="350" y2="247" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Phase 3: Training Data -->
  <rect x="60" y="252" width="580" height="72" rx="8" fill="#1e2a1e" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="60" y="252" width="5" height="72" rx="2" fill="#22c55e"/>
  <text x="82" y="274" fill="#86efac" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="700">Phase 4 · Training Data Generation</text>
  <text x="82" y="293" fill="#cbd5e1" font-family="'Segoe UI', system-ui, sans-serif" font-size="11">3,208 GPT-4o-mini seed pairs · 500 visual pairs (image + text) · 678 validation examples</text>
  <text x="82" y="311" fill="#94a3b8" font-family="'Segoe UI', system-ui, sans-serif" font-size="10.5">GPT-4o-mini verification of 2,161 pseudo-labels → 5,369 total verified pairs · Cost: $0.15</text>

  <!-- Arrow -->
  <line x1="350" y1="324" x2="350" y2="344" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Phase 4: Fine-tuning -->
  <rect x="60" y="349" width="580" height="85" rx="8" fill="#261a35" stroke="#a855f7" stroke-width="1.5"/>
  <rect x="60" y="349" width="5" height="85" rx="2" fill="#a855f7"/>
  <text x="82" y="371" fill="#d8b4fe" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="700">Phase 5 · Fine-tuning · Qwen2-VL 7B</text>
  <text x="82" y="390" fill="#cbd5e1" font-family="'Segoe UI', system-ui, sans-serif" font-size="11">QLoRA rank 16 · Unsloth 2x faster · Modal A100 80GB · 3 epochs · 504 steps</text>
  <text x="82" y="408" fill="#cbd5e1" font-family="'Segoe UI', system-ui, sans-serif" font-size="11">0.48% trainable params · Final loss 0.02 · MLflow experiment tracking</text>
  <!-- Accuracy badges -->
  <rect x="82" y="417" width="90" height="16" rx="3" fill="#16213e"/>
  <text x="127" y="429" text-anchor="middle" fill="#93c5fd" font-family="'Segoe UI', system-ui, sans-serif" font-size="9.5" font-weight="700">Overall 94.2%</text>
  <rect x="180" y="417" width="88" height="16" rx="3" fill="#16213e"/>
  <text x="224" y="429" text-anchor="middle" fill="#93c5fd" font-family="'Segoe UI', system-ui, sans-serif" font-size="9.5" font-weight="700">Brand 100%</text>
  <rect x="276" y="417" width="78" height="16" rx="3" fill="#16213e"/>
  <text x="315" y="429" text-anchor="middle" fill="#93c5fd" font-family="'Segoe UI', system-ui, sans-serif" font-size="9.5" font-weight="700">Price 100%</text>
  <rect x="362" y="417" width="120" height="16" rx="3" fill="#16213e"/>
  <text x="422" y="429" text-anchor="middle" fill="#93c5fd" font-family="'Segoe UI', system-ui, sans-serif" font-size="9.5" font-weight="700">Visual fields 100%</text>

  <!-- Arrow -->
  <line x1="350" y1="434" x2="350" y2="454" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Phase 5: Extraction -->
  <rect x="60" y="459" width="580" height="72" rx="8" fill="#2a1f1a" stroke="#f97316" stroke-width="1.5"/>
  <rect x="60" y="459" width="5" height="72" rx="2" fill="#f97316"/>
  <text x="82" y="481" fill="#fdba74" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="700">Phase 6 · Extraction Pipeline</text>
  <text x="82" y="500" fill="#cbd5e1" font-family="'Segoe UI', system-ui, sans-serif" font-size="11">Batched inference · 4-component confidence scorer · Pydantic v2 validation</text>
  <text x="82" y="518" fill="#94a3b8" font-family="'Segoe UI', system-ui, sans-serif" font-size="10.5">3,920 processed → 2,161 high-conf (65%) · 556 review · 497 failed · 8.7s avg latency</text>

  <!-- Arrow splits -->
  <line x1="350" y1="531" x2="350" y2="545" stroke="#4a5568" stroke-width="1.5"/>
  <line x1="200" y1="545" x2="500" y2="545" stroke="#4a5568" stroke-width="1.5"/>
  <line x1="200" y1="545" x2="200" y2="560" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="500" y1="545" x2="500" y2="560" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Phase 6a: Neo4j -->
  <rect x="60" y="565" width="270" height="80" rx="8" fill="#1a2332" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="60" y="565" width="5" height="80" rx="2" fill="#3b82f6"/>
  <text x="82" y="587" fill="#93c5fd" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="700">Phase 7a · Neo4j AuraDB</text>
  <text x="82" y="605" fill="#cbd5e1" font-family="'Segoe UI', system-ui, sans-serif" font-size="10.5">2,160 Product nodes · 1,041 Brands</text>
  <text x="82" y="621" fill="#cbd5e1" font-family="'Segoe UI', system-ui, sans-serif" font-size="10.5">17 Categories · 47 Allergens</text>
  <text x="82" y="637" fill="#94a3b8" font-family="'Segoe UI', system-ui, sans-serif" font-size="10">6,248 relationships · BELONGS_TO · MADE_BY · HAS_TAG</text>

  <!-- Phase 6b: Qdrant -->
  <rect x="370" y="565" width="270" height="80" rx="8" fill="#1e1a2d" stroke="#8b5cf6" stroke-width="1.5"/>
  <rect x="370" y="565" width="5" height="80" rx="2" fill="#8b5cf6"/>
  <text x="392" y="587" fill="#c4b5fd" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="700">Phase 7b · Qdrant Cloud</text>
  <text x="392" y="605" fill="#cbd5e1" font-family="'Segoe UI', system-ui, sans-serif" font-size="10.5">2,161 vectors · 384-dim embeddings</text>
  <text x="392" y="621" fill="#cbd5e1" font-family="'Segoe UI', system-ui, sans-serif" font-size="10.5">all-MiniLM-L6-v2 · payload indexes</text>
  <text x="392" y="637" fill="#94a3b8" font-family="'Segoe UI', system-ui, sans-serif" font-size="10">Filtered vector search · category · price · dietary_tags</text>

  <!-- Arrows merge -->
  <line x1="200" y1="645" x2="200" y2="668" stroke="#4a5568" stroke-width="1.5"/>
  <line x1="500" y1="645" x2="500" y2="668" stroke="#4a5568" stroke-width="1.5"/>
  <line x1="200" y1="668" x2="500" y2="668" stroke="#4a5568" stroke-width="1.5"/>
  <line x1="350" y1="668" x2="350" y2="682" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Phase 7: GraphRAG -->
  <rect x="60" y="687" width="580" height="72" rx="8" fill="#1a2d2d" stroke="#06b6d4" stroke-width="1.5"/>
  <rect x="60" y="687" width="5" height="72" rx="2" fill="#06b6d4"/>
  <text x="82" y="709" fill="#67e8f9" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="700">Phase 7c · GraphRAG Hybrid Search</text>
  <text x="82" y="728" fill="#cbd5e1" font-family="'Segoe UI', system-ui, sans-serif" font-size="11">Qdrant semantic search → top-50 candidates → Neo4j constraint verification</text>
  <text x="82" y="746" fill="#94a3b8" font-family="'Segoe UI', system-ui, sans-serif" font-size="10.5">Filter queries → Cypher templates · Semantic queries → vector similarity · Score: 0.7×semantic + 0.3×quality</text>

  <!-- Arrow -->
  <line x1="350" y1="759" x2="350" y2="779" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Phase 8: LangGraph Agent -->
  <rect x="60" y="784" width="580" height="85" rx="8" fill="#2a2218" stroke="#f59e0b" stroke-width="1.5"/>
  <rect x="60" y="784" width="5" height="85" rx="2" fill="#f59e0b"/>
  <text x="82" y="806" fill="#fcd34d" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="700">Phase 10 · LangGraph Agent · Groq (Llama 3.3 70B)</text>
  <text x="82" y="825" fill="#cbd5e1" font-family="'Segoe UI', system-ui, sans-serif" font-size="11">6-node StateGraph · extract_intent → route_query → build_cypher/hybrid_search → format_answer</text>
  <!-- Node flow -->
  <rect x="82" y="834" width="75" height="16" rx="3" fill="#1c1a10"/>
  <text x="119" y="846" text-anchor="middle" fill="#fcd34d" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" font-weight="600">extract_intent</text>
  <text x="163" y="846" fill="#4a5568" font-family="'Segoe UI', system-ui, sans-serif" font-size="10">→</text>
  <rect x="172" y="834" width="72" height="16" rx="3" fill="#1c1a10"/>
  <text x="208" y="846" text-anchor="middle" fill="#fcd34d" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" font-weight="600">route_query</text>
  <text x="249" y="846" fill="#4a5568" font-family="'Segoe UI', system-ui, sans-serif" font-size="10">→</text>
  <rect x="258" y="834" width="76" height="16" rx="3" fill="#1c1a10"/>
  <text x="296" y="846" text-anchor="middle" fill="#fcd34d" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" font-weight="600">build_cypher</text>
  <text x="339" y="846" fill="#4a5568" font-family="'Segoe UI', system-ui, sans-serif" font-size="10">→</text>
  <rect x="348" y="834" width="80" height="16" rx="3" fill="#1c1a10"/>
  <text x="388" y="846" text-anchor="middle" fill="#fcd34d" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" font-weight="600">execute_query</text>
  <text x="433" y="846" fill="#4a5568" font-family="'Segoe UI', system-ui, sans-serif" font-size="10">→</text>
  <rect x="442" y="834" width="82" height="16" rx="3" fill="#1c1a10"/>
  <text x="483" y="846" text-anchor="middle" fill="#fcd34d" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" font-weight="600">format_answer</text>
  <text x="82" y="864" fill="#94a3b8" font-family="'Segoe UI', system-ui, sans-serif" font-size="10.5">~1.7s filter · ~3s semantic · LangSmith traced · Groq LPU inference</text>

  <!-- Arrow -->
  <line x1="350" y1="869" x2="350" y2="889" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Phase 9: API + UI -->
  <rect x="60" y="894" width="580" height="60" rx="8" fill="#1a2d1a" stroke="#10b981" stroke-width="1.5"/>
  <rect x="60" y="894" width="5" height="60" rx="2" fill="#10b981"/>
  <text x="82" y="916" fill="#6ee7b7" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="700">Phase 11–12 · FastAPI + Streamlit</text>
  <text x="82" y="935" fill="#cbd5e1" font-family="'Segoe UI', system-ui, sans-serif" font-size="11">POST /v1/query · POST /v1/search · GET /v1/analytics · GET /v1/health</text>
  <text x="82" y="950" fill="#94a3b8" font-family="'Segoe UI', system-ui, sans-serif" font-size="10.5">Natural language UI · Product cards with real images · Health dashboard · Example queries</text>

  <!-- Bottom tagline -->
  <text x="350" y="990" text-anchor="middle" fill="#4a5568" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-style="italic">Vectors guess. Graphs know. GraphRAG does both.</text>
</svg>
