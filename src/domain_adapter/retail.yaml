# ── Dietary tag normalization ────────────────────────────────────
# Maps synonyms → canonical dietary tag
dietary_tag_aliases:
  # Vegan
  "plant-based": "vegan"
  "100% vegan": "vegan"
  "purely vegan": "vegan"
  "vegan friendly": "vegan"

  # Gluten-Free
  "gluten free": "gluten-free"
  "gluten-free certified": "gluten-free"
  "gf certified": "gluten-free"
  "certified gluten free": "gluten-free"

  # Sugar-Free
  "sugar free": "sugar-free"
  "no sugar": "sugar-free"
  "zero sugar": "sugar-free"
  "no added sugar": "sugar-free"
  "unsweetened": "sugar-free"

  # Non-GMO
  "non gmo": "non-GMO"
  "non-gmo verified": "non-GMO"
  "nongmo": "non-GMO"
  "non gmo verified": "non-GMO"

  # Organic
  "usda organic": "organic"
  "100% organic": "organic"
  "certified organic": "organic"
  "organic certified": "organic"

  # Dairy-Free
  "dairy free": "dairy-free"
  "non dairy": "dairy-free"
  "non-dairy": "dairy-free"

  # Soy-Free
  "soy free": "soy-free"
  "no soy": "soy-free"

  # Nut-Free
  "nut free": "nut-free"
  "tree nut free": "nut-free"
  "peanut free": "nut-free"

  # Allergen-Free
  "allergen free": "allergen-free"
  "free from allergens": "allergen-free"

  # Kosher
  "kosher certified": "kosher"
  "kosher pareve": "kosher"

  # Paleo / Keto
  "paleo friendly": "paleo"
  "paleo diet": "paleo"
  "keto friendly": "keto"
  "ketogenic": "keto"
  "keto diet": "keto"

  # High-Protein
  "high protein": "high-protein"
  "good source of protein": "high-protein"

  # Low-Calorie
  "low calorie": "low-calorie"
  "low cal": "low-calorie"

  # Caffeine-Free
  "caffeine free": "caffeine-free"
  "decaf": "caffeine-free"
  "decaffeinated": "caffeine-free"

# ── Unit normalization ───────────────────────────────────────────
# Maps messy unit strings → canonical form
# These appear in the "Unit" column of your CSV
unit_aliases:
  # Ounces
  "ounce": "oz"
  "ounces": "oz"
  "Ounce": "oz"
  "Ounces": "oz"
  "OZ": "oz"

  # Fluid Ounces
  "fluid ounce": "fl oz"
  "fluid ounces": "fl oz"
  "Fl Oz": "fl oz"
  "FL OZ": "fl oz"

  # Pounds
  "pound": "lb"
  "pounds": "lb"
  "lbs": "lb"
  "LB": "lb"

  # Count
  "Count": "ct"
  "count": "ct"
  "CT": "ct"
  "piece": "ct"
  "pieces": "ct"
  "pack": "ct"

  # Milliliters
  "milliliter": "ml"
  "milliliters": "ml"
  "ML": "ml"

  # Liters
  "liter": "L"
  "liters": "L"
  "litre": "L"
  "litres": "L"

  # Grams
  "gram": "g"
  "grams": "g"
  "GM": "g"
  "gm": "g"

  # Kilograms
  "kilogram": "kg"
  "kilograms": "kg"
  "KG": "kg"

# ── Compliance fields ────────────────────────────────────────────
# These fields get an extra validation pass before graph write.
# A missing or invalid value here → routed to product.failed
# Removed fssai_license — not applicable to US dataset
compliance_fields:
  - allergen_list
  - dietary_tags

# ── Known categories ─────────────────────────────────────────────
# Based on actual products observed in the Amazon US dataset.
# Used by labeling functions to assign category labels.
