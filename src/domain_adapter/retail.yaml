# ════════════════════════════════════════════════════════════════
#  Domain Adapter — Retail / Grocery (US Amazon dataset)
#  Used by: normalizer.py, validator.py, labeling_functions.py
#
#  NOTE: This file grows over time. Add new aliases when you
#  spot recurring patterns in data/extracted/failed.csv
# ════════════════════════════════════════════════════════════════

# ── Brand normalization ──────────────────────────────────────────
# Maps messy supplier spellings → canonical brand name
# RapidFuzz handles close misspellings automatically.
# Only add here when fuzzy matching consistently gets it wrong.
brand_aliases:
  # Smucker's
  "smuckers": "Smucker's"
  "smucker's natural": "Smucker's"
  "smuckers natural": "Smucker's"

  # Trader Joe's
  "trader joes": "Trader Joe's"
  "traderjoes": "Trader Joe's"

  # AriZona
  "arizona": "AriZona"
  "arizona beverages": "AriZona"

  # Bush's
  "bush's best": "Bush's"
  "bushs best": "Bush's"
  "bushs": "Bush's"

  # BODYARMOR
  "bodyarmor": "BODYARMOR"
  "body armor": "BODYARMOR"
  "body armour": "BODYARMOR"

  # Nature's Path
